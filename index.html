<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyberpunk Playing Cards</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="controls">
  <button id="glitch-toggle" onclick="toggleEffects()">
    STATUS: <span id="status-text">CYBER MODE</span>
  </button>
</div>
  <div class="cyber-table">
    <main id="playing-cards">
      <div class="card spades">
        <div class="left">A<br>♠</div>
        <div class="middle">♠<br>♠<br>♠</div>
        <div class="right">A<br>♠</div>
      </div>
      <div class="card hearts">
        <div class="left">7<br>♥</div>
        <div class="middle">♥<br>♥<br>♥</div>
        <div class="right">7<br>♥</div>
      </div>
      <div class="card diamonds">
        <div class="left">K<br>♦</div>
        <div class="middle">♦<br>♦<br>♦</div>
        <div class="right">K<br>♦</div>
      </div>
      <div class="card clubs">
        <div class="left">J<br>♣</div>
        <div class="middle">♣<br>♣<br>♣</div>
        <div class="right">J<br>♣</div>
      </div>

      <div class="card spades">
        <div class="left">10<br>♠</div>
        <div class="middle">♠<br>♠<br>♠</div>
        <div class="right">10<br>♠</div>
      </div>
      <div class="card hearts">
        <div class="left">Q<br>♥</div>
        <div class="middle">♥<br>♥<br>♥</div>
        <div class="right">Q<br>♥</div>
      </div>
      <div class="card diamonds">
        <div class="left">9<br>♦</div>
        <div class="middle">♦<br>♦<br>♦</div>
        <div class="right">9<br>♦</div>
      </div>
      <div class="card clubs">
        <div class="left">8<br>♣</div>
        <div class="middle">♣<br>♣<br>♣</div>
        <div class="right">8<br>♣</div>
      </div>
    </main>
  </div>
<script src="script.js">
</script>
  
</body>

</html>
